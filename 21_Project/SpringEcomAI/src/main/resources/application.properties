spring.application.name=SpringEcomAI

# MariaDB Configuration
spring.datasource.url=jdbc:mariadb://localhost:3307/telusko_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


# OpenAI Configuration
spring.ai.openai.api-key=${OPENAI_API_KEY:<YOUR_OPENAI_API_KEY>}
spring.ai.openai.chat.options.model=gpt-4o


# Vector DB Configurations
spring.ai.openai.embedding.options.model=text-embedding-3-small
spring.ai.vectorstore.mariadb.initialize-schema=true
spring.main.allow-bean-definition-overriding=true


spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
