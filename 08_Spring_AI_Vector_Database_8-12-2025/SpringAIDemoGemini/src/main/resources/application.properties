spring.application.name=SpringAIDemoGemini

spring.datasource.url=jdbc:mariadb://localhost:3306/spring_ai
spring.datasource.username=root
spring.datasource.password=<YOUR_PASSWORD>
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.ai.vectorstore.mariadb.initialize-schema=true

spring.main.allow-bean-definition-overriding=true


spring.ai.openai.api-key=<YOUR_API_KEY>
spring.ai.openai.base-url=https://generativelanguage.googleapis.com/v1beta/openai
spring.ai.openai.chat.completions-path=/chat/completions
spring.ai.openai.chat.options.model=gemini-2.5-flash
spring.ai.model.embedding.text=google-genai
spring.ai.google.genai.embedding.api-key=<YOUR_API_KEY>
spring.ai.google.genai.embedding.text.options.model=text-embedding-004