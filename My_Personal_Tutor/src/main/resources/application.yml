spring:
  application:
    name: tutor
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  sql:
    init:
      mode: always # Forces schema.sql to run on startup
  datasource:
    url: jdbc:mariadb://localhost:3307/tutor_db
    username: root
    password: root
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none # CRITICAL: Disable Hibernate auto-update to protect the VECTOR column
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:<YOUR_OPENAI_API_KEY>}
      chat:
        options:
          model: gpt-4o
